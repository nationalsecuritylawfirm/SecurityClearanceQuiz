<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — Clearance Quiz</title>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:#1e3a5f; --navy-light:#2a4f82; --blue:#2563eb; --blue-light:#3b82f6;
  --bg:#f8fafc; --surface:#ffffff; --border:#e2e8f0; --border-md:#cbd5e1;
  --text:#0f172a; --text-2:#475569; --text-3:#94a3b8;
  --t1:#059669; --t1-bg:#ecfdf5; --t1-border:#a7f3d0;
  --t2:#2563eb; --t2-bg:#eff6ff; --t2-border:#bfdbfe;
  --t3:#d97706; --t3-bg:#fffbeb; --t3-border:#fde68a;
  --t4:#ea580c; --t4-bg:#fff7ed; --t4-border:#fed7aa;
  --t5:#dc2626; --t5-bg:#fef2f2; --t5-border:#fecaca;
}
body { font-family:system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); line-height:1.6; min-height:100vh; }
h1 { font-size:1.75rem; font-weight:700; line-height:1.25; }
h2 { font-size:1.25rem; font-weight:600; line-height:1.3; }
h3 { font-size:1rem; font-weight:600; }
p  { color:var(--text-2); }
.page { max-width:720px; margin:0 auto; padding:2rem 1.25rem 4rem; }
.page-wide { max-width:1100px; margin:0 auto; padding:2rem 1.25rem 4rem; }
.navbar { background:var(--navy); padding:0 1.5rem; display:flex; align-items:center; gap:2rem; height:56px; position:sticky; top:0; z-index:100; }
.navbar-brand { color:white; font-weight:700; font-size:1rem; text-decoration:none; letter-spacing:.01em; white-space:nowrap; }
.navbar-links { display:flex; gap:.25rem; margin-left:auto; }
.navbar-link { color:rgba(255,255,255,.75); text-decoration:none; font-size:.875rem; padding:.4rem .75rem; border-radius:6px; transition:background .15s,color .15s; }
.navbar-link:hover,.navbar-link.active { background:rgba(255,255,255,.12); color:white; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1.5rem; }
.card+.card { margin-top:1rem; }
.btn { display:inline-flex; align-items:center; gap:.4rem; padding:.55rem 1.1rem; border-radius:7px; font-size:.9rem; font-weight:500; cursor:pointer; border:1px solid transparent; transition:background .15s,opacity .15s; text-decoration:none; white-space:nowrap; }
.btn:disabled { opacity:.45; cursor:not-allowed; }
.btn-primary  { background:var(--blue); color:white; }
.btn-navy     { background:var(--navy); color:white; }
.btn-navy:hover:not(:disabled) { background:var(--navy-light); }
.btn-outline  { background:white; color:var(--text); border-color:var(--border-md); }
.btn-outline:hover:not(:disabled) { border-color:var(--blue); color:var(--blue); }
.btn-sm { padding:.35rem .7rem; font-size:.8rem; }
.btn-lg { padding:.75rem 1.5rem; font-size:1rem; font-weight:600; }
.form-group { display:flex; flex-direction:column; gap:.375rem; }
.form-group+.form-group { margin-top:1rem; }
label { font-size:.875rem; font-weight:500; color:var(--text); }
input[type=text],input[type=email],input[type=tel],select,textarea { padding:.55rem .75rem; border:1px solid var(--border-md); border-radius:7px; font-size:.9rem; font-family:inherit; color:var(--text); background:white; width:100%; transition:border-color .15s,box-shadow .15s; }
input:focus,select:focus,textarea:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(37,99,235,.12); }
textarea { resize:vertical; min-height:80px; }
.tier-badge { display:inline-flex; align-items:center; gap:.35rem; padding:.25rem .65rem; border-radius:999px; font-size:.78rem; font-weight:600; }
.tier-1 { background:var(--t1-bg); color:var(--t1); border:1px solid var(--t1-border); }
.tier-2 { background:var(--t2-bg); color:var(--t2); border:1px solid var(--t2-border); }
.tier-3 { background:var(--t3-bg); color:var(--t3); border:1px solid var(--t3-border); }
.tier-4 { background:var(--t4-bg); color:var(--t4); border:1px solid var(--t4-border); }
.tier-5 { background:var(--t5-bg); color:var(--t5); border:1px solid var(--t5-border); }
.result-card { border-radius:10px; padding:1.75rem; border-width:1.5px; border-style:solid; }
.result-card.tier-1 { background:var(--t1-bg); border-color:var(--t1-border); }
.result-card.tier-2 { background:var(--t2-bg); border-color:var(--t2-border); }
.result-card.tier-3 { background:var(--t3-bg); border-color:var(--t3-border); }
.result-card.tier-4 { background:var(--t4-bg); border-color:var(--t4-border); }
.result-card.tier-5 { background:var(--t5-bg); border-color:var(--t5-border); }
.tag { display:inline-block; padding:.2rem .55rem; background:var(--bg); border:1px solid var(--border); border-radius:999px; font-size:.78rem; color:var(--text-2); }
.text-muted { color:var(--text-3); font-size:.875rem; }
.mt-3{margin-top:.75rem}.mt-4{margin-top:1rem}
.hidden { display:none !important; }
  </style>
  <style>
    body { background: var(--bg); }

    /* Progress */
    .progress-bar-wrap {
      height: 4px;
      background: var(--border);
      position: sticky;
      top: 56px;
      z-index: 50;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--blue);
      transition: width 0.35s ease;
    }

    /* Quiz shell */
    .quiz-shell {
      max-width: 640px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
    }

    /* Header */
    .quiz-header { margin-bottom: 2.5rem; }
    .quiz-header h1 { color: var(--navy); font-size: 1.4rem; margin-bottom: 0.25rem; }
    .quiz-step   { font-size: 0.8rem; color: var(--text-3); font-weight: 500; margin-bottom: 0.75rem; }

    /* Question */
    .question-wrap { animation: fadeSlide 0.25s ease; }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .question-text {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 1.25rem;
      line-height: 1.4;
    }

    /* Options */
    .options-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .option-btn {
      width: 100%;
      text-align: left;
      padding: 0.85rem 1rem;
      background: white;
      border: 1.5px solid var(--border-md);
      border-radius: 9px;
      font-size: 0.9rem;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
      line-height: 1.45;
    }
    .option-btn:hover {
      border-color: var(--blue-light);
      background: #f0f6ff;
    }
    .option-btn.selected {
      border-color: var(--blue);
      background: #eff6ff;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
      font-weight: 500;
    }

    /* Nav */
    .quiz-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 2rem;
    }

    /* Grounding note */
    .grounding-note {
      margin-top: 2.5rem;
      padding: 0.875rem 1rem;
      background: white;
      border: 1px solid var(--border);
      border-left: 3px solid var(--blue-light);
      border-radius: 0 7px 7px 0;
      font-size: 0.8rem;
      color: var(--text-2);
      line-height: 1.55;
    }

    /* Result screen */
    #result-screen { animation: fadeSlide 0.3s ease; }

    .result-card { margin-bottom: 1.25rem; }
    .result-label {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    .result-message { font-size: 0.9rem; line-height: 1.65; }
    .result-flags-wrap { margin-top: 1rem; }
    .result-flags-label { font-size: 0.78rem; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.4rem; }
    .result-flags { display: flex; flex-wrap: wrap; gap: 0.4rem; }

    .result-cta {
      margin-top: 1.5rem;
      padding: 1.25rem;
      background: white;
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .result-cta h3 { margin-bottom: 0.5rem; }
    .result-cta p  { font-size: 0.875rem; margin-bottom: 1rem; }

    /* Lead capture */
    .lead-capture {
      margin-top: 1.5rem;
      padding: 1.5rem;
      background: white;
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .lead-capture h3 { margin-bottom: 0.25rem; }
    .lead-capture > p { font-size: 0.875rem; margin-bottom: 1.25rem; }
    .lead-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    @media (max-width: 480px) { .lead-form-row { grid-template-columns: 1fr; } }
    .radio-group { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 0.25rem; }
    .radio-option {
      display: flex; align-items: center; gap: 0.35rem;
      font-size: 0.875rem; cursor: pointer;
    }
    .lead-success {
      text-align: center;
      padding: 1.5rem;
      color: var(--t1);
    }
    .lead-success .checkmark { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="index.html">Clearance Quiz</a>
    <div class="navbar-links">
      <a class="navbar-link" href="index.html">← All Quizzes</a>
    </div>
  </nav>

  <!-- Progress bar -->
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <div class="quiz-shell">
    <!-- Question screen -->
    <div id="question-screen">
      <div class="quiz-header">
        <div class="quiz-step" id="step-label">Question 1 of 9</div>
        <h1 id="quiz-title">Loading…</h1>
      </div>
      <div class="question-wrap" id="question-wrap">
        <div class="question-text" id="question-text"></div>
        <div class="options-list" id="options-list"></div>
      </div>
      <div class="quiz-nav">
        <button class="btn btn-outline" id="btn-back" onclick="goBack()">← Back</button>
        <button class="btn btn-navy" id="btn-next" onclick="goNext()" disabled>Next →</button>
      </div>
      <div id="grounding-note-wrap"></div>
    </div>

    <!-- Result screen (hidden initially) -->
    <div id="result-screen" class="hidden">
      <div style="margin-bottom:1rem;">
        <div class="quiz-step">Your result</div>
        <h1 id="result-quiz-title" style="color:var(--navy)"></h1>
      </div>

      <div class="result-card card" id="result-card">
        <div class="result-label" id="result-label"></div>
        <div class="result-message" id="result-message"></div>
        <div class="result-flags-wrap" id="result-flags-wrap" style="display:none">
          <div class="result-flags-label">Issues flagged</div>
          <div class="result-flags" id="result-flags"></div>
        </div>
      </div>

      <div class="result-cta" id="result-cta">
        <h3>Recommended next step</h3>
        <p id="cta-description"></p>
        <button class="btn btn-navy btn-lg" id="cta-btn" onclick="ctaClicked()"></button>
      </div>

      <div class="lead-capture" id="lead-capture">
        <h3>Want personalized guidance?</h3>
        <p>Enter your information and we'll follow up based on your result.</p>
        <form id="lead-form" onsubmit="submitLead(event)">
          <div class="lead-form-row">
            <div class="form-group">
              <label for="lf-name">Full Name *</label>
              <input type="text" id="lf-name" required placeholder="Jane Smith">
            </div>
            <div class="form-group">
              <label for="lf-email">Email *</label>
              <input type="email" id="lf-email" required placeholder="jane@example.com">
            </div>
          </div>
          <div class="form-group mt-3" id="lf-phone-wrap">
            <label for="lf-phone">Phone <span style="color:var(--text-3);font-weight:400">(optional)</span></label>
            <input type="tel" id="lf-phone" placeholder="555-555-5555">
          </div>
          <div class="form-group mt-3" id="lf-deadline-wrap">
            <label>Are you facing a deadline?</label>
            <div class="radio-group">
              <label class="radio-option"><input type="radio" name="deadline" value="yes"> Yes</label>
              <label class="radio-option"><input type="radio" name="deadline" value="no" checked> No</label>
              <label class="radio-option"><input type="radio" name="deadline" value="not sure"> Not sure</label>
            </div>
          </div>
          <div class="form-group mt-3 hidden" id="lf-issuetype-wrap">
            <label for="lf-issuetype" id="lf-issuetype-label">What type of issue?</label>
            <select id="lf-issuetype"></select>
          </div>
          <button type="submit" class="btn btn-navy btn-lg mt-4" style="width:100%">Send My Information →</button>
        </form>
        <div class="lead-success hidden" id="lead-success">
          <span class="checkmark">✓</span>
          <strong>Thank you!</strong><br>
          <span style="font-size:0.9rem;color:var(--text-2)">We'll be in touch based on your result.</span>
        </div>
      </div>

      <div style="margin-top:1.5rem;text-align:center;">
        <a href="index.html" class="btn btn-outline">← Take another quiz</a>
      </div>
    </div>
  </div>

  <script>
const SEED_QUIZZES=[{id:'sf86-red-flags',slug:'sf86-red-flags',title:'SF-86 Readiness Check',subtitle:'Do You Have Any Security Clearance Red Flags?',groundingNote:'',questions:[{id:'sf86-q1',order:1,text:'Where are you in the security clearance process?',options:[{id:'sf86-q1o1',text:'I have not submitted the SF-86/SF-85 yet',tier:1,flags:[]},{id:'sf86-q1o2',text:'I already submitted the SF-86/SF-85',tier:1,flags:[]},{id:'sf86-q1o3',text:'I received a Letter of Interrogatory (LOI), Statement of Reasons (SOR), denial, suspension, or revocation notice',tier:5,flags:['LOI, SOR, or formal government action']}]},{id:'sf86-q2',order:2,text:'Do you have complete residence, education, employment, foreign travel, and/or criminal record history?',options:[{id:'sf86-q2o1',text:'Yes',tier:1,flags:[]},{id:'sf86-q2o2',text:'Mostly, but I am missing some dates, supporting documents, addresses, or supervisor/contact information',tier:2,flags:['Information gaps']},{id:'sf86-q2o3',text:'I have gaps I am not sure how to explain',tier:2,flags:['Information gaps']}]},{id:'sf86-q3',order:3,text:'Do you have any foreign contacts, foreign relatives, foreign travel, dual citizenship, foreign property, or foreign financial interests?',options:[{id:'sf86-q3o1',text:'No',tier:1,flags:[]},{id:'sf86-q3o2',text:'Yes, but straightforward',tier:1,flags:[]},{id:'sf86-q3o3',text:'Yes, and I am not sure what must be listed',tier:3,flags:['Foreign interests or contacts']},{id:'sf86-q3o4',text:'Yes, and the country or relationship may raise concerns',tier:3,flags:['Foreign interests or contacts']}]},{id:'sf86-q4',order:4,text:'Do you have financial issues?',options:[{id:'sf86-q4o1',text:'No',tier:1,flags:[]},{id:'sf86-q4o2',text:'Past late payments, now resolved',tier:3,flags:['Financial issue']},{id:'sf86-q4o3',text:'Current delinquent debt',tier:3,flags:['Financial issue','Current delinquency']},{id:'sf86-q4o4',text:'Tax debt, collections, charge-offs, bankruptcy, wage garnishment, or foreclosure',tier:3,flags:['Financial issue','Tax or bankruptcy issue']},{id:'sf86-q4o5',text:'I am not sure what appears on my credit report',tier:2,flags:['Unknown credit report issue']}]},{id:'sf86-q5',order:5,text:'Any police, criminal, or court history?',options:[{id:'sf86-q5o1',text:'No',tier:1,flags:[]},{id:'sf86-q5o2',text:'Yes — older or minor issue, now resolved',tier:3,flags:['Police or court history']},{id:'sf86-q5o3',text:'Yes — recent or still pending',tier:3,flags:['Police or court history','Pending legal matter']},{id:'sf86-q5o4',text:'Yes — serious or sensitive matters (felony, domestic violence, restraining order, assault, firearms)',tier:3,flags:['Police or court history','Serious criminal matter']},{id:'sf86-q5o5',text:"I'm not sure whether I need to disclose it",tier:4,flags:['Disclosure concern']}]},{id:'sf86-q6',order:6,text:'Any drug, marijuana, CBD/delta, or controlled substance issue?',options:[{id:'sf86-q6o1',text:'No',tier:1,flags:[]},{id:'sf86-q6o2',text:'Past marijuana/THC or controlled substance use',tier:3,flags:['Drug or substance issue']},{id:'sf86-q6o3',text:'Recent marijuana/THC or controlled substance use',tier:3,flags:['Drug or substance issue']},{id:'sf86-q6o4',text:'Use while cleared or after starting the clearance process',tier:3,flags:['Drug use while cleared']},{id:'sf86-q6o5',text:'I am not sure how to answer',tier:4,flags:['Disclosure concern']}]},{id:'sf86-q7',order:7,text:'Any alcohol-related incidents?',options:[{id:'sf86-q7o1',text:'No',tier:1,flags:[]},{id:'sf86-q7o2',text:'One older incident',tier:3,flags:['Alcohol incident']},{id:'sf86-q7o3',text:'Recent incident(s)',tier:3,flags:['Alcohol incident']},{id:'sf86-q7o4',text:'Work, school, or military alcohol issue',tier:3,flags:['Alcohol incident']},{id:'sf86-q7o5',text:'Treatment, relapse, or repeated incidents',tier:3,flags:['Alcohol or treatment issue']}]},{id:'sf86-q8',order:8,text:'Have you had a prior clearance issue?',options:[{id:'sf86-q8o1',text:'No',tier:1,flags:[]},{id:'sf86-q8o2',text:'Prior interim clearance denied',tier:3,flags:['Prior clearance issue']},{id:'sf86-q8o3',text:'Prior clearance denied, suspended, or revoked',tier:3,flags:['Prior clearance issue']},{id:'sf86-q8o4',text:'Prior SOR/LOI/interrogatories',tier:3,flags:['Prior clearance issue']},{id:'sf86-q8o5',text:'I previously omitted or misstated something',tier:4,flags:['Disclosure concern','Prior omission or misstatement']}]},{id:'sf86-q9',order:9,text:'Are you worried about inconsistent, incomplete, or inaccurate answers?',options:[{id:'sf86-q9o1',text:'No',tier:1,flags:[]},{id:'sf86-q9o2',text:'Maybe',tier:4,flags:['Disclosure concern']},{id:'sf86-q9o3',text:'Yes, I omitted something',tier:4,flags:['Disclosure concern','Omission']},{id:'sf86-q9o4',text:'Yes, I gave different information before',tier:4,flags:['Disclosure concern','Inconsistent information']},{id:'sf86-q9o5',text:'Yes, I already submitted and need to correct something',tier:4,flags:['Disclosure concern','Correction needed']}]}],results:[{tier:1,label:'Ready to Submit — Keep It Accurate',forPeopleWith:'Complete history, no major issues, and no inconsistency concerns.',message:'Your answers suggest you may be in a good position to continue preparing your questionnaire. The most important next step is accuracy: make sure dates, addresses, contacts, and explanations are complete before submission.',ctaText:'Download the SF-86 final review checklist',ctaType:'download'},{tier:2,label:'Information Gaps — Gather Details Before Submitting',forPeopleWith:'People missing dates, addresses, employment details, foreign travel details, supervisor contacts, or court records.',message:'Your answers suggest the biggest issue may not be a legal red flag, but missing or incomplete information. Before submitting, gather documents and clarify gaps so your answers are consistent and complete.',ctaText:'Get the SF-86 document checklist',ctaType:'download'},{tier:3,label:'Potential Red Flags — Explanation May Matter',forPe ,tier:2,flags:[]},{id:'sr-q9o2',text:'Preparing a self-report or explanation',tier:3,flags:[]},{id:'sr-q9o3',text:'Fixing a late, incomplete, or inconsistent report',tier:4,flags:[]},{id:'sr-q9o4',text:'Responding to security questions, a deadline, suspension, or access restriction',tier:5,flags:[]},{id:'sr-q9o5',text:'Just understanding my risk',tier:1,flags:[]}]}],results:[{tier:1,label:'No Obvious Reporting Trigger Flagged — Confirm Agency Rules',forPeopleWith:'People with no flagged event, no government contact, no reporting delay, and no security-sensitive issue.',message:'Your answers did not flag an obvious self-reporting trigger in this quiz. Reporting procedures can vary by agency, clearance level, and position, so keep records and follow your security office, FSO, command, or agency guidance if anything changes.',ctaText:'Download the Security Clearance Self-Reporting Checklist',ctaType:'download'},{tier:2,label:'Possible Reporting Issue — Clarify Before You Assume',forPeopleWith:'People with uncertainty about whether they are covered, older/minor resolved issues, or informal reporting.',message:'Your answers suggest the reporting answer may depend on details. Before assuming the issue does or does not need to be reported, gather the dates, documents, people involved, current status, and any agency or FSO instructions.',ctaText:'Get the Self-Reporting Preparation Checklist',ctaType:'download'},{tier:3,label:'Likely Self-Reporting Issue — Prepare a Clear Report',forPeopleWith:'People with foreign travel, foreign contacts, arrests, DUI/court issues, financial problems, drug/alcohol issues, or outside activities.',message:'Your answers suggest the event may fall within a self-reporting category. The next step is to prepare a clear, accurate summary of what happened, when it happened, who was involved, whether it is ongoing, and what documents support your explanation.',ctaText:'Schedule a Self-Reporting Strategy Consultation',ctaType:'schedule'},{tier:4,label   <script>
const KEYS={quizzes:'ql_quizzes',responses:'ql_responses'};
const Storage={
  init(){if(!localStorage.getItem(KEYS.quizzes))localStorage.setItem(KEYS.quizzes,JSON.stringify(SEED_QUIZZES));},
  getQuizzes(){return JSON.parse(localStorage.getItem(KEYS.quizzes)||'[]');},
  getQuiz(id){return this.getQuizzes().find(q=>q.id===id||q.slug===id)||null;},
  saveQuiz(quiz){const qs=this.getQuizzes();const i=qs.findIndex(q=>q.id===quiz.id);if(i>=0)qs[i]=quiz;else qs.push(quiz);localStorage.setItem(KEYS.quizzes,JSON.stringify(qs));},
  deleteQuiz(id){localStorage.setItem(KEYS.quizzes,JSON.stringify(this.getQuizzes().filter(q=>q.id!==id)));},
  getResponses(){return JSON.parse(localStorage.getItem(KEYS.responses)||'[]');},
  saveResponse(r){const rs=this.getResponses();rs.unshift(r);localStorage.setItem(KEYS.responses,JSON.stringify(rs));},
  deleteResponse(id){localStorage.setItem(KEYS.responses,JSON.stringify(this.getResponses().filter(r=>r.id!==id)));},
  clearResponses(){localStorage.setItem(KEYS.responses,'[]');},
  scoreAnswers(quiz,opts){let max=1;const flags=[];for(const o of opts){if(o.tier>max)max=o.tier;for(const f of o.flags)if(!flags.includes(f))flags.push(f);}return{tier:max,result:quiz.results.find(r=>r.tier===max),flags:flags.slice(0,3)};},
  generateId(){return'id_'+Math.random().toString(36).slice(2,10)+'_'+Date.now().toString(36);}
};
  </script>
  <script>
    let quiz = null;
    let currentQ = 0;
    let answers = []; // array of selected option objects, one per question

    // ── Init ────────────────────────────────────

    function init() {
      Storage.init();
      const params = new URLSearchParams(location.search);
      const id = params.get('id');

      quiz = id ? Storage.getQuiz(id) : null;

      if (!quiz) {
        document.getElementById('quiz-title').textContent = 'Quiz not found.';
        document.getElementById('btn-next').disabled = true;
        return;
      }

      document.title = quiz.title + ' — Clearance Quiz';
      document.getElementById('quiz-title').textContent = quiz.title;

      // Grounding note
      if (quiz.groundingNote) {
        document.getElementById('grounding-note-wrap').innerHTML =
          `<div class="grounding-note">${escHtml(quiz.groundingNote)}</div>`;
      }

      // Lead capture: issue type dropdown
      const lc = quiz.leadCapture || {};
      if (lc.issueTypeOptions && lc.issueTypeOptions.length) {
        const wrap = document.getElementById('lf-issuetype-wrap');
        wrap.classList.remove('hidden');
        if (lc.issueTypeLabel) document.getElementById('lf-issuetype-label').textContent = lc.issueTypeLabel;
        const sel = document.getElementById('lf-issuetype');
        sel.innerHTML = lc.issueTypeOptions.map(o => `<option>${escHtml(o)}</option>`).join('');
      }

      // Hide fields not in leadCapture.fields
      const fields = lc.fields || ['name', 'email', 'phone', 'deadline'];
      if (!fields.includes('phone'))    document.getElementById('lf-phone-wrap').style.display = 'none';
      if (!fields.includes('deadline')) document.getElementById('lf-deadline-wrap').style.display = 'none';

      renderQuestion();
    }

    // ── Question rendering ──────────────────────

    function renderQuestion() {
      const q = quiz.questions[currentQ];
      const total = quiz.questions.length;

      document.getElementById('step-label').textContent = `Question ${currentQ + 1} of ${total}`;
      document.getElementById('question-text').textContent = q.text;
      document.getElementById('progress-fill').style.width = `${(currentQ / total) * 100}%`;
      document.getElementById('btn-back').disabled = currentQ === 0;

      const selected = answers[currentQ];
      const list = document.getElementById('options-list');
      list.innerHTML = q.options.map(opt => `
        <button class="option-btn${selected && selected.id === opt.id ? ' selected' : ''}"
                onclick="selectOption(${JSON.stringify(opt).replace(/"/g, '&quot;')})">
          ${escHtml(opt.text)}
        </button>
      `).join('');

      document.getElementById('btn-next').disabled = !selected;
      document.getElementById('btn-next').textContent =
        currentQ === total - 1 ? 'See My Result →' : 'Next →';

      // Re-trigger animation
      const wrap = document.getElementById('question-wrap');
      wrap.style.animation = 'none';
      wrap.offsetHeight; // reflow
      wrap.style.animation = '';
    }

    function selectOption(opt) {
      answers[currentQ] = opt;
      document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
      event.currentTarget.classList.add('selected');
      document.getElementById('btn-next').disabled = false;
    }

    function goNext() {
      if (!answers[currentQ]) return;
      if (currentQ < quiz.questions.length - 1) {
        currentQ++;
        renderQuestion();
      } else {
        showResult();
      }
    }

    function goBack() {
      if (currentQ > 0) {
        currentQ--;
        renderQuestion();
      }
    }

    // ── Result ──────────────────────────────────

    function showResult() {
      const { tier, result, flags } = Storage.scoreAnswers(quiz, answers);

      // Progress bar to 100%
      document.getElementById('progress-fill').style.width = '100%';

      // Populate result card
      document.getElementById('result-quiz-title').textContent = quiz.title;
      document.getElementById('result-label').textContent = result.label;
      document.getElementById('result-message').textContent = result.message;

      const card = document.getElementById('result-card');
      card.className = `result-card card tier-${tier}`;

      if (flags.length) {
        document.getElementById('result-flags-wrap').style.display = '';
        document.getElementById('result-flags').innerHTML = flags.map(f =>
          `<span class="tag">${escHtml(f)}</span>`
        ).join('');
      }

      // CTA
      const ctaDescriptions = {
        download: 'Download a checklist tailored to your situation to prepare your next step.',
        schedule:  'Schedule a consultation with a security clearance attorney to review your situation.',
        contact:   'Contact our office for an urgent case review — time-sensitive matters require prompt attention.',
        request:   'Submit a request and our team will reach out to discuss your case.',
      };
      document.getElementById('cta-description').textContent = ctaDescriptions[result.ctaType] || '';
      document.getElementById('cta-btn').textContent = result.ctaText;

      // Switch screens
      document.getElementById('question-screen').classList.add('hidden');
      document.getElementById('result-screen').classList.remove('hidden');

      window.scrollTo({ top: 0, behavior: 'smooth' });

      // Store partial result for lead submission
      window._quizResult = { tier, result, flags };
    }

    function ctaClicked() {
      // Scroll to lead capture form
      document.getElementById('lead-capture').scrollIntoView({ behavior: 'smooth' });
    }

    // ── Lead capture ────────────────────────────

    function submitLead(e) {
      e.preventDefault();
      const { tier, result, flags } = window._quizResult || {};
      const deadline = document.querySelector('input[name="deadline"]:checked');

      const response = {
        id: Storage.generateId(),
        quizId: quiz.id,
        quizTitle: quiz.title,
        timestamp: new Date().toISOString(),
        answers: answers.map((opt, i) => ({
          questionId: quiz.questions[i].id,
          questionText: quiz.questions[i].text,
          optionId: opt.id,
          optionText: opt.text,
        })),
        resultTier: tier,
        resultLabel: result ? result.label : '',
        triggeredFlags: flags || [],
        leadCapture: {
          name: document.getElementById('lf-name').value.trim(),
          email: document.getElementById('lf-email').value.trim(),
          phone: document.getElementById('lf-phone').value.trim(),
          deadline: deadline ? deadline.value : '',
          issueType: document.getElementById('lf-issuetype').value || '',
        },
      };

      Storage.saveResponse(response);
      document.getElementById('lead-form').classList.add('hidden');
      document.getElementById('lead-success').classList.remove('hidden');
    }

    // ── Util ────────────────────────────────────

    function escHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    init();
  </script>
</body>
</html>
